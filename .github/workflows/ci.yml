name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: detect Wincher docs bundle drift (no auto-commit).
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile package
        run: |
          python -m py_compile wincher_mcp_server.py
          python -m compileall -q src/wincher_mcp

      - name: Unit tests
        run: pytest -q

      - name: Build wheel (packaging smoke)
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build

      - name: Dependency audit
        run: pip-audit

  api-spec-check:
    name: Wincher OpenAPI drift
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify vendored spec chunk hash
        run: python3 scripts/fetch_wincher_openapi.py --check
